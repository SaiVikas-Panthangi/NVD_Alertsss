name: NVD Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Daily at 08:00 UTC (13:30 IST)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    env:
      CCMA_ENV: ${{ github.event.inputs.environment || 'staging' }}
      SEND_EMAIL_REPORT: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.CCMA_USERNAME }}" ]; then
            echo "❌ Missing secret: CCMA_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.CCMA_PASSWORD }}" ]; then
            echo "❌ Missing secret: CCMA_PASSWORD"
            exit 1
          fi
          echo "✅ Required secrets configured"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test
        env:
          CCMA_USERNAME: ${{ secrets.CCMA_USERNAME }}
          CCMA_PASSWORD: ${{ secrets.CCMA_PASSWORD }}
          TEST_ENVIRONMENT_URL: ${{ secrets.TEST_ENVIRONMENT_URL }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            test-results/**/*.json
          check_name: Playwright Test Results

      - name: Notify on Failure
        if: failure()
        shell: bash
        run: |
          FAILURE_MESSAGE='{"text":"🚨 NVD Playwright Tests FAILED\nEnvironment: ${{ env.CCMA_ENV }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$FAILURE_MESSAGE" \
            || echo "⚠️  Failed to send Teams notification"

      - name: Notify on Success
        if: success() && github.event_name == 'schedule'
        shell: bash
        run: |
          SUCCESS_MESSAGE='{"text":"✅ NVD Playwright Tests PASSED\nEnvironment: ${{ env.CCMA_ENV }}\nTests completed successfully"}'
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$SUCCESS_MESSAGE" \
            || echo "⚠️  Failed to send Teams notification"
